# Local/self-hosted Postgres for the MCP gateway. In production point
# DATABASE_URL at your managed/own Postgres instead of running this.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quantakrypto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: quantakrypto_mcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantakrypto -d quantakrypto_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
